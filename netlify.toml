[build]
  command = "npm run build"
  publish = "dist"

# Cross-origin isolation (WebCodecs threads / SharedArrayBuffer).
# Also set via public/_headers as a fallback.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

# SPA fallback so deep links resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
